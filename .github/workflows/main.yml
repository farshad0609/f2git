name: Download, Separate Zip

on:
  workflow_dispatch:

jobs:
  process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run downloader
        run: python download.py

      # 🧹 حذف releaseهای قبلی (fail-safe)
      - name: Delete old releases
        run: |
          releases=$(gh release list | awk '{print $1}')
          if [ -z "$releases" ]; then
            echo "No releases to delete"
          else
            echo "$releases" | while read tag; do
              echo "Deleting $tag"
              gh release delete "$tag" -y || true
            done
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 📦 ساخت zip با پسورد فقط برای فایل‌های واقعی
      - name: Zip files with password
        run: |
          mkdir zipped
          i=1
          for file in downloads/*; do
            if [ -f "$file" ]; then
              echo "Zipping $file -> $i.zip"
              zip -j -P github "zipped/$i.zip" "$file"
              i=$((i+1))
            fi
          done

      # 🚀 ساخت release
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-${{ github.run_number }}
          name: Auto Release ${{ github.run_number }}
          files: zipped/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
