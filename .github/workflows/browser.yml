name: Browser Downloader

on:
  workflow_dispatch:
    inputs:
      aria2_mode:
        description: "Download Mode"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - aria2c_only
          - browser_only

      connections:
        description: "Aria2 Connections"
        required: true
        default: "2"
        type: choice
        options:
          - "1"
          - "2"
          - "4"
          - "8"
          - "16"

permissions:
  contents: write

jobs:
  browser-download:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install packages
        run: |
          sudo apt update
          sudo apt install -y zip unzip p7zip-full aria2 curl
          pip install playwright requests
          playwright install chromium

      - name: Prepare folders
        run: |
          mkdir -p downloads
          mkdir -p grabbed
          mkdir -p zipped

      - name: Copy links
        run: |
          cp browser.txt grabbed/links.txt

      - name: Extract direct video links
        run: |
          python << 'EOF'
          from playwright.sync_api import sync_playwright
          import re
          import requests
          import os

          os.makedirs("grabbed", exist_ok=True)

          def is_bad(url):
              bad_words = [
                  "logo",
                  "banner",
                  "sprite",
                  "thumb",
                  "preview",
                  "sample",
                  "ads",
                  "promo",
                  "ol_"
              ]

              u = url.lower()

              for b in bad_words:
                  if b in u:
                      return True

              return False

          def get_size(url):
              try:
                  r = requests.head(url, allow_redirects=True, timeout=20)

                  size = int(r.headers.get("content-length", 0))

                  return size
              except:
                  return 0

          links = []

          with open("grabbed/links.txt", "r", encoding="utf-8") as f:
              links = [x.strip() for x in f if x.strip()]

          final_links = []

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)

              for page_url in links:

                  print(f"\nOPENING: {page_url}")

                  page = browser.new_page()

                  found = []

                  def handle_response(resp):
                      try:
                          url = resp.url

                          if any(x in url.lower() for x in [
                              ".mp4",
                              ".m3u8",
                              ".vid"
                          ]):
                              found.append(url)

                      except:
                          pass

                  page.on("response", handle_response)

                  try:
                      page.goto(page_url, wait_until="networkidle", timeout=120000)
                      page.wait_for_timeout(8000)
                  except:
                      pass

                  page.close()

                  cleaned = []

                  for u in found:

                      if is_bad(u):
                          continue

                      size = get_size(u)

                      mb = size / 1024 / 1024

                      if mb < 20:
                          continue

                      cleaned.append((u, size))

                  if not cleaned:
                      print("NO VALID VIDEO FOUND")
                      continue

                  unique = {}

                  for u, s in cleaned:

                      if s not in unique:
                          unique[s] = (u, s)

                  cleaned = list(unique.values())

                  preferred = []

                  for u, s in cleaned:

                      low = u.lower()

                      score = 0

                      if "480" in low:
                          score += 100

                      elif "540" in low:
                          score += 90

                      elif "720" in low:
                          score += 80

                      elif "1080" in low:
                          score += 70

                      else:
                          score += 10

                      preferred.append((score, s, u))

                  preferred.sort(reverse=True)

                  best = preferred[0][2]

                  print(f"SELECTED: {best}")

                  final_links.append(best)

              browser.close()

          with open("grabbed/final_links.txt", "w", encoding="utf-8") as f:
              for x in final_links:
                  f.write(x + "\n")

          EOF

      - name: Download videos
        env:
          MODE: ${{ github.event.inputs.aria2_mode }}
          CONNECTIONS: ${{ github.event.inputs.connections }}
        run: |

          if [ ! -f grabbed/final_links.txt ]; then
            echo "No links found"
            exit 1
          fi

          COUNT=1

          while read URL; do

            echo "================================"
            echo "DOWNLOADING:"
            echo "$URL"
            echo "================================"

            EXT="mp4"

            if [[ "$URL" == *.m3u8* ]]; then
              EXT="mp4"
            elif [[ "$URL" == *.vid* ]]; then
              EXT="mp4"
            fi

            OUTPUT="downloads/video_${COUNT}.${EXT}"

            SUCCESS=0

            if [[ "$MODE" != "browser_only" ]]; then

              echo "[ARIA2] trying download..."

              aria2c \
                -x ${CONNECTIONS} \
                -s ${CONNECTIONS} \
                --file-allocation=none \
                --summary-interval=1 \
                --download-result=full \
                --max-tries=3 \
                --retry-wait=5 \
                --auto-file-renaming=false \
                -o "video_${COUNT}.${EXT}" \
                -d downloads \
                "$URL"

              if [ -f "$OUTPUT" ]; then

                SIZE=$(stat -c%s "$OUTPUT")

                if [ "$SIZE" -gt 20000000 ]; then
                  SUCCESS=1
                  echo "[ARIA2] SUCCESS"
                else
                  rm -f "$OUTPUT"
                fi
              fi
            fi

            if [[ "$SUCCESS" == "0" && "$MODE" != "aria2c_only" ]]; then

              echo "[BROWSER FALLBACK]"

              curl -L \
                --retry 3 \
                --retry-delay 5 \
                -A "Mozilla/5.0" \
                -o "$OUTPUT" \
                "$URL"

              if [ -f "$OUTPUT" ]; then

                SIZE=$(stat -c%s "$OUTPUT")

                if [ "$SIZE" -lt 20000000 ]; then
                  echo "BAD FILE"
                  rm -f "$OUTPUT"
                fi
              fi
            fi

            COUNT=$((COUNT+1))

          done < grabbed/final_links.txt

      - name: Create zip
        env:
          ZIP_PASSWORD: ${{ secrets.ZIP_PASSWORD }}
        run: |

          cd downloads

          if [ -z "$(ls -A .)" ]; then
            echo "No downloaded files"
            exit 1
          fi

          DATE=$(date +"%Y-%m-%d_%H-%M-%S")

          zip -r -P "$ZIP_PASSWORD" \
            "../zipped/browser_${DATE}.zip" .

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: browser-${{ github.run_number }}
          files: zipped/*
