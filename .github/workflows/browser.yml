name: 5 - Browser Downloader

on:
  workflow_dispatch:
    inputs:
      preferred_quality:
        description: "Preferred quality"
        required: true
        default: "480"
        type: choice
        options:
          - "480"
          - "720"
          - "1080"

      min_size_mb:
        description: "Minimum video size in MB"
        required: true
        default: "20"

      upload_mode:
        description: "Upload mode"
        required: true
        default: "zip"
        type: choice
        options:
          - "zip"
          - "direct"

      delete_old_releases:
        description: "Delete old releases?"
        required: true
        default: "yes"
        type: choice
        options:
          - "yes"
          - "no"

permissions:
  contents: write

jobs:
  browser-download:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            ffmpeg \
            zip \
            curl \
            wget \
            aria2 \
            jq \
            gh

          npm init -y
          npm install playwright

          npx playwright install chromium

      - name: Prepare folders
        run: |
          mkdir -p downloads
          mkdir -p grabbed

      - name: Create Playwright script
        run: |
          cat > browser_dl.js << 'EOF'

          const fs = require('fs');
          const { chromium } = require('playwright');

          (async () => {

            const browser = await chromium.launch({
              headless: true
            });

            const context = await browser.newContext({
              userAgent:
                'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/122 Safari/537.36'
            });

            const page = await context.newPage();

            const found = new Set();

            page.on('response', async (response) => {

              try {

                const url = response.url();

                if (
                  url.includes('.mp4') ||
                  url.includes('.m3u8') ||
                  url.includes('.vid')
                ) {

                  const clean = url.split('?')[0];

                  if (found.has(clean)) return;

                  found.add(clean);

                  console.log('FOUND:', url);

                  fs.appendFileSync(
                    'grabbed/raw_links.txt',
                    url + '\n'
                  );

                }

              } catch (e) {}

            });

            const urls = fs
              .readFileSync('browser.txt', 'utf8')
              .split('\n')
              .map(v => v.trim())
              .filter(Boolean);

            for (const url of urls) {

              console.log('OPENING:', url);

              try {

                await page.goto(url, {
                  waitUntil: 'networkidle',
                  timeout: 120000
                });

                await page.waitForTimeout(15000);

              } catch (e) {
                console.log('ERROR:', e);
              }

            }

            await browser.close();

          })();

          EOF

      - name: Run Playwright
        run: |
          node browser_dl.js

      - name: Analyze links
        env:
          QUALITY: ${{ github.event.inputs.preferred_quality }}
          MIN_SIZE: ${{ github.event.inputs.min_size_mb }}
        run: |

          touch grabbed/final_links.txt

          python3 << 'EOF'

          import requests
          import os

          quality = os.environ["QUALITY"]
          min_size = int(os.environ["MIN_SIZE"]) * 1024 * 1024

          links = []

          with open("grabbed/raw_links.txt", "r", encoding="utf-8") as f:
              links = [x.strip() for x in f if x.strip()]

          checked = []
          seen_sizes = []

          for url in links:

              try:

                  r = requests.head(
                      url,
                      allow_redirects=True,
                      timeout=20,
                      headers={
                          "User-Agent": "Mozilla/5.0"
                      }
                  )

                  size = int(r.headers.get("content-length", 0))

                  print(f"CHECK: {size/1024/1024:.1f} MB -> {url}")

                  if size < min_size:
                      print("SKIP: too small")
                      continue

                  duplicate = False

                  for s in seen_sizes:
                      diff = abs(size - s)

                      if diff < (s * 0.02):
                          duplicate = True
                          break

                  if duplicate:
                      print("SKIP: duplicate size")
                      continue

                  seen_sizes.append(size)

                  score = 999

                  url_lower = url.lower()

                  if quality in url_lower:
                      score = 1
                  elif "480" in url_lower:
                      score = 2
                  elif "720" in url_lower:
                      score = 3
                  elif "1080" in url_lower:
                      score = 4
                  else:
                      score = 10

                  checked.append({
                      "url": url,
                      "size": size,
                      "score": score
                  })

              except Exception as e:
                  print("ERROR:", e)

          checked.sort(key=lambda x: (x["score"], x["size"]))

          final = checked[:2]

          with open("grabbed/final_links.txt", "w", encoding="utf-8") as f:
              for item in final:
                  print("SELECTED:", item["url"])
                  f.write(item["url"] + "\n")

          EOF

      - name: Download videos
        run: |

          if [ ! -f grabbed/final_links.txt ]; then
            echo "No links found"
            exit 1
          fi

          counter=1

          while read url; do

            [ -z "$url" ] && continue

            echo ""
            echo "================================"
            echo "DOWNLOADING:"
            echo "$url"
            echo "================================"

            clean_url=$(echo "$url" | cut -d'?' -f1)

            ext=$(echo "$clean_url" | grep -oE '\.(mp4|m3u8|vid)' | head -1 | tr -d '.')

            if [[ "$ext" == "m3u8" ]]; then

              echo "[FFMPEG] downloading m3u8"

              ffmpeg \
                -y \
                -user_agent "Mozilla/5.0" \
                -i "$url" \
                -c copy \
                "downloads/${counter}.mp4"

            else

              echo "[ARIA2] trying download..."

              aria2c \
                -x 16 \
                -s 16 \
                -k 1M \
                -c \
                --summary-interval=0 \
                --download-result=hide \
                --console-log-level=warn \
                --dir=downloads \
                --out="${counter}.${ext:-mp4}" \
                "$url"

              result=$?

              if [ $result -ne 0 ]; then

                echo "[CURL FALLBACK] aria2 failed"

                curl -L \
                  --retry 5 \
                  --connect-timeout 30 \
                  -A "Mozilla/5.0" \
                  -o "downloads/${counter}.${ext:-mp4}" \
                  "$url"

              fi

            fi

            counter=$((counter+1))

          done < grabbed/final_links.txt

      - name: Create ZIP
        if: github.event.inputs.upload_mode == 'zip'
        run: |

          ts=$(date +"%Y%m%d_%H%M%S")

          zip -r \
            -P "${{ secrets.ZIP_PASSWORD }}" \
            "browser_media_${ts}.zip" \
            downloads/

      - name: Delete old releases
        if: github.event.inputs.delete_old_releases == 'yes'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |

          releases=$(gh release list --limit 100 | awk '{print $1}')

          for tag in $releases; do
            gh release delete "$tag" -y || true
          done

      - name: Upload ZIP Release
        if: github.event.inputs.upload_mode == 'zip'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: browser-${{ github.run_number }}
          files: "*.zip"

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Direct Video Release
        if: github.event.inputs.upload_mode == 'direct'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: browser-${{ github.run_number }}
          files: "downloads/*"

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}: ${{ secrets.GITHUB_TOKEN }}
