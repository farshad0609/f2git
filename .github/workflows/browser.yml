name: Browser Downloader Debug

on:
  workflow_dispatch:
    inputs:
      aria2_mode:
        description: "Download Mode"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - aria2c_only
          - browser_only

      connections:
        description: "Aria2 Connections"
        required: true
        default: "4"
        type: choice
        options:
          - "1"
          - "2"
          - "4"
          - "8"
          - "16"

permissions:
  contents: write

jobs:
  browser-download:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Switch Ubuntu mirror
        run: |
          sudo sed -i 's|http://azure.archive.ubuntu.com/ubuntu|http://archive.ubuntu.com/ubuntu|g' /etc/apt/sources.list || true

      - name: Cache Playwright
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ms-playwright
            ~/.cache/pip
          key: playwright-${{ runner.os }}-v2

      - name: Install packages
        run: |
          sudo apt update

          sudo apt install -y \
            zip \
            unzip \
            p7zip-full \
            aria2 \
            curl \
            ffmpeg

          pip install playwright requests

      - name: Install Chromium
        run: |
          playwright install chromium --only-shell

      - name: Prepare folders
        run: |
          rm -rf downloads grabbed zipped

          mkdir -p downloads
          mkdir -p grabbed
          mkdir -p zipped

      - name: Copy links
        run: |
          cp browser.txt grabbed/links.txt

      - name: Extract direct video links
        run: |
          python << 'EOF'
          from playwright.sync_api import sync_playwright
          import os

          os.makedirs("grabbed", exist_ok=True)

          links = []

          with open("grabbed/links.txt", "r", encoding="utf-8") as f:
              links = [x.strip() for x in f if x.strip()]

          final_links = []

          with sync_playwright() as p:

              browser = p.chromium.launch(
                  headless=True,
                  args=[
                      "--disable-blink-features=AutomationControlled",
                      "--no-sandbox",
                      "--disable-dev-shm-usage"
                  ]
              )

              for page_url in links:

                  print("\n================================")
                  print("OPENING:", page_url)
                  print("================================")

                  page = browser.new_page(
                      user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/136.0.0.0 Safari/537.36",
                      viewport={"width": 1366, "height": 768},
                      locale="en-US"
                  )

                  page.add_init_script("""
                  Object.defineProperty(navigator, 'webdriver', {
                      get: () => undefined
                  })
                  """)

                  found = []

                  def handle_response(resp):

                      try:
                          url = resp.url

                          print("RESPONSE:", url)

                          if url not in found:
                              found.append(url)

                      except Exception as e:
                          print("ERROR:", e)

                  page.on("response", handle_response)

                  try:

                      page.goto(
                          page_url,
                          wait_until="domcontentloaded",
                          timeout=120000
                      )

                      # simulate human activity
                      page.mouse.move(400, 400)
                      page.wait_for_timeout(3000)

                      page.mouse.move(600, 500)
                      page.wait_for_timeout(3000)

                      page.mouse.wheel(0, 500)

                      page.wait_for_timeout(20000)

                  except Exception as e:

                      print("PAGE ERROR:", e)

                  # VIDEO TAGS
                  try:

                      videos = page.locator("video").evaluate_all(
                          """els => els.map(v => v.src)"""
                      )

                      for v in videos:

                          if v and v not in found:

                              found.append(v)

                              print("VIDEO TAG:", v)

                  except Exception as e:

                      print("VIDEO TAG ERROR:", e)

                  # SOURCE TAGS
                  try:

                      sources = page.locator("source").evaluate_all(
                          """els => els.map(v => v.src)"""
                      )

                      for s in sources:

                          if s and s not in found:

                              found.append(s)

                              print("SOURCE TAG:", s)

                  except Exception as e:

                      print("SOURCE TAG ERROR:", e)

                  page.close()

                  print("\n========== FOUND LINKS ==========")

                  for x in found:
                      print(x)

                  print("=================================\n")

                  selected = None

                  priority = [
                      ".mp4",
                      ".m3u8",
                      ".webm",
                      ".mkv",
                      ".mov",
                      ".vid",
                      "master.m3u8"
                  ]

                  # اول لینک ویدیویی واقعی
                  for p in priority:

                      for x in found:

                          low = x.lower()

                          if p in low:
                              selected = x
                              break

                      if selected:
                          break

                  # اگر هیچ چیز پیدا نشد
                  if selected is None:

                      for x in found:

                          if x.startswith("http"):
                              selected = x
                              break

                  if selected:

                      print("SELECTED:")
                      print(selected)

                      final_links.append(selected)

                  else:

                      print("NO LINK SELECTED")

              browser.close()

          with open("grabbed/final_links.txt", "w", encoding="utf-8") as f:

              for x in final_links:
                  f.write(x + "\n")

          print("\n======================")
          print("FINAL LINKS")
          print("======================")

          for x in final_links:
              print(x)

          EOF

      - name: Show extracted links
        run: |
          echo "======================"
          echo "EXTRACTED LINKS"
          echo "======================"

          cat grabbed/final_links.txt || true

      - name: Download videos
        env:
          MODE: ${{ github.event.inputs.aria2_mode }}
          CONNECTIONS: ${{ github.event.inputs.connections }}
        run: |

          if [ ! -f grabbed/final_links.txt ]; then
            echo "No links found"
            exit 1
          fi

          COUNT=1

          while read URL; do

            [ -z "$URL" ] && continue

            echo ""
            echo "================================"
            echo "DOWNLOADING:"
            echo "$URL"
            echo "================================"

            OUTPUT="downloads/video_${COUNT}.mp4"

            SUCCESS=0

            if [[ "$MODE" != "browser_only" ]]; then

              echo "[ARIA2]"

              aria2c \
                -x ${CONNECTIONS} \
                -s ${CONNECTIONS} \
                --file-allocation=none \
                --summary-interval=1 \
                --download-result=full \
                --max-tries=3 \
                --retry-wait=5 \
                --auto-file-renaming=false \
                -o "video_${COUNT}.mp4" \
                -d downloads \
                "$URL"

              if [ -f "$OUTPUT" ]; then

                SIZE=$(stat -c%s "$OUTPUT")

                echo "SIZE: $SIZE"

                if [ "$SIZE" -gt 1000000 ]; then
                  SUCCESS=1
                  echo "[ARIA2 SUCCESS]"
                else
                  echo "[ARIA2 BAD FILE]"
                  rm -f "$OUTPUT"
                fi
              fi
            fi

            if [[ "$SUCCESS" == "0" && "$MODE" != "aria2c_only" ]]; then

              echo "[CURL FALLBACK]"

              curl -L \
                --retry 3 \
                --retry-delay 5 \
                -A "Mozilla/5.0" \
                -o "$OUTPUT" \
                "$URL"

              if [ -f "$OUTPUT" ]; then

                SIZE=$(stat -c%s "$OUTPUT")

                echo "SIZE: $SIZE"

                if [ "$SIZE" -gt 1000000 ]; then
                  SUCCESS=1
                  echo "[CURL SUCCESS]"
                else
                  echo "[CURL BAD FILE]"
                  rm -f "$OUTPUT"
                fi
              fi
            fi

            if [[ "$SUCCESS" == "0" ]]; then

              echo "[FFMPEG FALLBACK]"

              ffmpeg \
                -y \
                -i "$URL" \
                -c copy \
                "$OUTPUT"

              if [ -f "$OUTPUT" ]; then

                SIZE=$(stat -c%s "$OUTPUT")

                echo "SIZE: $SIZE"

                if [ "$SIZE" -gt 1000000 ]; then
                  SUCCESS=1
                  echo "[FFMPEG SUCCESS]"
                else
                  echo "[FFMPEG BAD FILE]"
                  rm -f "$OUTPUT"
                fi
              fi
            fi

            if [[ "$SUCCESS" == "0" ]]; then
              echo "FAILED"
            fi

            COUNT=$((COUNT+1))

          done < grabbed/final_links.txt

      - name: Show downloaded files
        run: |
          echo "======================"
          echo "DOWNLOADED FILES"
          echo "======================"

          ls -lh downloads || true

      - name: Create zip
        env:
          ZIP_PASSWORD: ${{ secrets.ZIP_PASSWORD }}
        run: |

          cd downloads

          if [ -z "$(ls -A .)" ]; then
            echo "No downloaded files"
            exit 1
          fi

          DATE=$(date +"%Y-%m-%d_%H-%M-%S")

          zip -r -P "$ZIP_PASSWORD" \
            "../zipped/browser_${DATE}.zip" .

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: browser-${{ github.run_number }}
          files: zipped/*
