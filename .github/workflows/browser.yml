name: Browser Downloader

on:
  workflow_dispatch:
    inputs:
      aria2_mode:
        description: "Download Mode"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - aria2c_only
          - browser_only

      connections:
        description: "Aria2 Connections"
        required: true
        default: "4"
        type: choice
        options:
          - "1"
          - "2"
          - "4"
          - "8"
          - "16"

permissions:
  contents: write

jobs:
  browser-download:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install packages
        run: |
          sudo apt update
          sudo apt install -y zip unzip p7zip-full aria2 curl ffmpeg
          pip install playwright requests
          playwright install chromium

      - name: Prepare folders
        run: |
          rm -rf downloads grabbed zipped
          mkdir -p downloads
          mkdir -p grabbed
          mkdir -p zipped

      - name: Copy links
        run: |
          cp browser.txt grabbed/links.txt

      - name: Extract direct video links
        run: |
          python << 'EOF'
          from playwright.sync_api import sync_playwright
          import requests
          import os
          import re

          os.makedirs("grabbed", exist_ok=True)

          BAD_WORDS = [
              "logo",
              "banner",
              "sprite",
              "thumb",
              "preview",
              "sample",
              "ads",
              "promo",
              "doubleclick",
              "googlesyndication",
              "popunder",
              "tracker",
              "analytics",
              "favicon",
              "subtitle",
              ".jpg",
              ".jpeg",
              ".png",
              ".gif",
              ".webp"
          ]

          VIDEO_HINTS = [
              ".mp4",
              ".m3u8",
              ".mkv",
              ".webm",
              ".mov",
              ".vid",
              "master.m3u8",
              "video",
              "/v/",
              "/mp4/"
          ]

          def is_bad(url):
              u = url.lower()

              for b in BAD_WORDS:
                  if b in u:
                      return True

              return False

          def looks_like_video(url):
              u = url.lower()

              for v in VIDEO_HINTS:
                  if v in u:
                      return True

              return False

          def get_size(url):
              try:
                  r = requests.head(
                      url,
                      allow_redirects=True,
                      timeout=20,
                      headers={
                          "User-Agent": "Mozilla/5.0"
                      }
                  )

                  size = int(r.headers.get("content-length", 0))

                  return size

              except:
                  return 0

          links = []

          with open("grabbed/links.txt", "r", encoding="utf-8") as f:
              links = [x.strip() for x in f if x.strip()]

          final_links = []

          with sync_playwright() as p:

              browser = p.chromium.launch(
                  headless=True
              )

              for page_url in links:

                  print("\n================================")
                  print("OPENING:", page_url)
                  print("================================")

                  page = browser.new_page()

                  found = []

                  def handle_response(resp):

                      try:
                          url = resp.url

                          if looks_like_video(url):

                              if not is_bad(url):

                                  if url not in found:
                                      found.append(url)

                                      print("FOUND:", url)

                      except:
                          pass

                  page.on("response", handle_response)

                  try:
                      page.goto(
                          page_url,
                          wait_until="domcontentloaded",
                          timeout=120000
                      )

                      page.wait_for_timeout(15000)

                  except Exception as e:
                      print("PAGE ERROR:", e)

                  page.close()

                  cleaned = []

                  for u in found:

                      if is_bad(u):
                          continue

                      size = get_size(u)

                      # اگر سایز مشخص نبود
                      # باز هم نگهش دار
                      if size == 0:
                          size = 999999999

                      cleaned.append((u, size))

                  if not cleaned:

                      print("NO VALID VIDEO FOUND")
                      continue

                  # حذف لینک‌های تکراری بر اساس حجم
                  # فقط یکی از هر سایز نگه داشته میشه

                  unique_by_size = {}

                  for u, s in cleaned:

                      # اولویت با mp4
                      score = 0

                      low = u.lower()

                      if ".mp4" in low:
                          score += 1000

                      if ".m3u8" in low:
                          score += 900

                      if "720" in low:
                          score += 700

                      elif "480" in low:
                          score += 600

                      elif "1080" in low:
                          score += 500

                      elif "360" in low:
                          score += 400

                      else:
                          score += 100

                      current = unique_by_size.get(s)

                      if current is None:
                          unique_by_size[s] = (score, u)

                      else:
                          old_score = current[0]

                          if score > old_score:
                              unique_by_size[s] = (score, u)

                  candidates = []

                  for s, data in unique_by_size.items():

                      score, url = data

                      candidates.append((score, s, url))

                  candidates.sort(reverse=True)

                  best = candidates[0][2]

                  print("\nSELECTED:")
                  print(best)

                  final_links.append(best)

              browser.close()

          with open("grabbed/final_links.txt", "w", encoding="utf-8") as f:

              for x in final_links:
                  f.write(x + "\n")

          print("\n==============================")
          print("FINAL LINKS")
          print("==============================")

          for x in final_links:
              print(x)

          EOF

      - name: Download videos
        env:
          MODE: ${{ github.event.inputs.aria2_mode }}
          CONNECTIONS: ${{ github.event.inputs.connections }}
        run: |

          if [ ! -f grabbed/final_links.txt ]; then
            echo "No links found"
            exit 1
          fi

          COUNT=1

          while read URL; do

            [ -z "$URL" ] && continue

            echo ""
            echo "================================"
            echo "DOWNLOADING:"
            echo "$URL"
            echo "================================"

            OUTPUT="downloads/video_${COUNT}.mp4"

            SUCCESS=0

            if [[ "$MODE" != "browser_only" ]]; then

              echo "[ARIA2] TRYING..."

              aria2c \
                -x ${CONNECTIONS} \
                -s ${CONNECTIONS} \
                --file-allocation=none \
                --summary-interval=1 \
                --download-result=full \
                --max-tries=3 \
                --retry-wait=5 \
                --auto-file-renaming=false \
                -o "video_${COUNT}.mp4" \
                -d downloads \
                "$URL"

              if [ -f "$OUTPUT" ]; then

                SIZE=$(stat -c%s "$OUTPUT")

                if [ "$SIZE" -gt 5000000 ]; then
                  SUCCESS=1
                  echo "[ARIA2] SUCCESS"
                else
                  echo "[ARIA2] BAD FILE"
                  rm -f "$OUTPUT"
                fi
              fi
            fi

            if [[ "$SUCCESS" == "0" && "$MODE" != "aria2c_only" ]]; then

              echo "[CURL FALLBACK]"

              curl -L \
                --retry 3 \
                --retry-delay 5 \
                -A "Mozilla/5.0" \
                -o "$OUTPUT" \
                "$URL"

              if [ -f "$OUTPUT" ]; then

                SIZE=$(stat -c%s "$OUTPUT")

                if [ "$SIZE" -gt 5000000 ]; then
                  SUCCESS=1
                  echo "[CURL] SUCCESS"
                else
                  echo "[CURL] BAD FILE"
                  rm -f "$OUTPUT"
                fi
              fi
            fi

            # اگر m3u8 بود
            # ffmpeg تست کن

            if [[ "$SUCCESS" == "0" ]]; then

              echo "[FFMPEG FALLBACK]"

              ffmpeg \
                -y \
                -i "$URL" \
                -c copy \
                "$OUTPUT"

              if [ -f "$OUTPUT" ]; then

                SIZE=$(stat -c%s "$OUTPUT")

                if [ "$SIZE" -gt 5000000 ]; then
                  SUCCESS=1
                  echo "[FFMPEG] SUCCESS"
                else
                  echo "[FFMPEG] BAD FILE"
                  rm -f "$OUTPUT"
                fi
              fi
            fi

            if [[ "$SUCCESS" == "0" ]]; then
              echo "FAILED"
            fi

            COUNT=$((COUNT+1))

          done < grabbed/final_links.txt

      - name: Remove bad files
        run: |

          find downloads -type f -size -5M -delete

      - name: Create zip
        env:
          ZIP_PASSWORD: ${{ secrets.ZIP_PASSWORD }}
        run: |

          cd downloads

          if [ -z "$(ls -A .)" ]; then
            echo "No downloaded files"
            exit 1
          fi

          DATE=$(date +"%Y-%m-%d_%H-%M-%S")

          zip -r -P "$ZIP_PASSWORD" \
            "../zipped/browser_${DATE}.zip" .

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: browser-${{ github.run_number }}
          files: zipped/*
