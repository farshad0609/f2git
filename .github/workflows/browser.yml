name: Browser Downloader

on:
  workflow_dispatch:
    inputs:

      download_mode:
        description: "Download Mode"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - browser_only
          - aria2_only

      preferred_quality:
        description: "Preferred Quality"
        required: true
        default: "480"
        type: choice
        options:
          - "480"
          - "720"
          - "1080"
          - "best"

      aria2_connections:
        description: "ARIA2 Connections"
        required: true
        default: "4"
        type: choice
        options:
          - "1"
          - "2"
          - "4"
          - "8"
          - "16"

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install packages
        run: |
          sudo apt update

          sudo apt install -y \
            ffmpeg \
            zip \
            unzip \
            wget \
            curl \
            jq \
            aria2

          pip install playwright requests

          playwright install chromium

      - name: Prepare folders
        run: |
          mkdir -p grabbed
          mkdir -p downloads
          mkdir -p zipped

      - name: Read links
        run: |
          cp browser.txt grabbed/links.txt

      - name: Extract video links with browser
        run: |

          python << 'EOF'

          import asyncio
          import re
          from playwright.async_api import async_playwright

          QUALITY = "${{ github.event.inputs.preferred_quality }}"

          async def main():

              with open("grabbed/links.txt", "r", encoding="utf-8") as f:
                  pages = [x.strip() for x in f if x.strip()]

              found = []

              async with async_playwright() as p:

                  browser = await p.chromium.launch(
                      headless=True
                  )

                  context = await browser.new_context()

                  for page_url in pages:

                      print(f"\nOPENING: {page_url}")

                      page = await context.new_page()

                      captured = []

                      page.on(
                          "response",
                          lambda response: captured.append(response.url)
                      )

                      try:
                          await page.goto(
                              page_url,
                              timeout=120000,
                              wait_until="networkidle"
                          )

                          await page.wait_for_timeout(10000)

                      except Exception as e:
                          print(e)

                      video_urls = []

                      for u in captured:

                          low = u.lower()

                          if any(x in low for x in [
                              ".mp4",
                              ".m3u8",
                              ".vid"
                          ]):

                              if "googleads" in low:
                                  continue

                              if "doubleclick" in low:
                                  continue

                              video_urls.append(u)

                      uniq = []

                      for v in video_urls:
                          if v not in uniq:
                              uniq.append(v)

                      scored = []

                      for u in uniq:

                          score = 0

                          if "480" in u:
                              score = 100

                          elif "720" in u:
                              score = 80

                          elif "1080" in u:
                              score = 60

                          else:
                              score = 10

                          scored.append((score, u))

                      scored.sort(reverse=True)

                      if scored:

                          selected = scored[0][1]

                          print(f"SELECTED: {selected}")

                          found.append(selected)

                      await page.close()

                  await browser.close()

              with open("grabbed/final_links.txt", "w") as f:
                  for x in found:
                      f.write(x + "\n")

          asyncio.run(main())

          EOF

      - name: Download files
        run: |

          if [ ! -f grabbed/final_links.txt ]; then
            echo "No links found"
            exit 1
          fi

          COUNTER=1

          while read url; do

            [ -z "$url" ] && continue

            echo "================================"
            echo "DOWNLOADING:"
            echo "$url"
            echo "================================"

            filename="video_${COUNTER}.mp4"

            MODE="${{ github.event.inputs.download_mode }}"
            CONN="${{ github.event.inputs.aria2_connections }}"

            SUCCESS=0

            if [ "$MODE" != "browser_only" ]; then

              echo "[ARIA2] trying download..."

              aria2c \
                -x "$CONN" \
                -s "$CONN" \
                -k 1M \
                --file-allocation=none \
                --summary-interval=1 \
                --retry-wait=3 \
                --max-tries=5 \
                --continue=true \
                --timeout=30 \
                --connect-timeout=30 \
                --max-connection-per-server="$CONN" \
                --split="$CONN" \
                --min-split-size=1M \
                --user-agent="Mozilla/5.0" \
                -o "$filename" \
                "$url"

              if [ -f "$filename" ]; then

                SIZE=$(stat -c%s "$filename")

                if [ "$SIZE" -gt 20000000 ]; then
                  SUCCESS=1
                  echo "[ARIA2] SUCCESS"
                else
                  rm -f "$filename"
                fi
              fi
            fi

            if [ "$SUCCESS" = "0" ] && [ "$MODE" != "aria2_only" ]; then

              echo "[BROWSER FALLBACK]"

              curl -L \
                -A "Mozilla/5.0" \
                --retry 5 \
                --retry-delay 3 \
                -o "$filename" \
                "$url"

              if [ -f "$filename" ]; then

                SIZE=$(stat -c%s "$filename")

                if [ "$SIZE" -gt 20000000 ]; then
                  SUCCESS=1
                  echo "[CURL] SUCCESS"
                else
                  rm -f "$filename"
                fi
              fi
            fi

            if [ "$SUCCESS" = "1" ]; then
              mv "$filename" downloads/
            fi

            COUNTER=$((COUNTER+1))

          done < grabbed/final_links.txt

      - name: Create zip
        run: |

          cd downloads

          TIMESTAMP=$(date +"%Y-%m-%d_%H-%M-%S")

          zip -r \
            -P "${{ secrets.ZIP_PASSWORD }}" \
            "../zipped/browser_${TIMESTAMP}.zip" .

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: browser-${{ github.run_number }}
          name: Browser Download
          files: zipped/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
