name: yt-dlp Download + x265 Encode + ZIP

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # 🐍 Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 📦 نصب yt-dlp و ffmpeg
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -U yt-dlp
          sudo apt update
          sudo apt install -y ffmpeg zip

      # 🎬 دانلود فایل‌ها
      - name: Download videos
        run: |
          mkdir -p downloads

          yt-dlp \
            -a yt.txt \
            -o "downloads/%(title).100s.%(ext)s" \
            --no-playlist \
            --restrict-filenames \
            --merge-output-format mp4 \
            --retries 3 \
            --fragment-retries 3 \
            --concurrent-fragments 5

      # 🎞️ Encode به x265
      - name: Encode videos to x265
        run: |
          mkdir -p encoded

          find downloads -type f | while read file; do

            ext="${file##*.}"

            case "$ext" in
              mp4|mkv|webm|mov|avi|flv)
                filename=$(basename "$file")
                output="encoded/${filename%.*}_x265.mp4"

                echo "Encoding: $filename"

                ffmpeg -y \
                  -i "$file" \
                  -c:v libx265 \
                  -preset fast \
                  -crf 28 \
                  -c:a aac \
                  -b:a 128k \
                  "$output"

                echo "Removing original: $file"
                rm -f "$file"
                ;;
              *)
                echo "Skipping non-video: $file"
                cp "$file" encoded/
                ;;
            esac

          done

      # 🧹 حذف releaseهای قبلی
      - name: Delete old releases
        run: |
          gh release list --json tagName -q '.[].tagName' | while read tag; do
            if [ ! -z "$tag" ]; then
              echo "Deleting release: $tag"
              gh release delete "$tag" -y || true
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 📦 ساخت ZIP رمزدار
      - name: Create ZIP
        env:
          ZIP_PASSWORD: ${{ secrets.ZIP_PASSWORD }}
        run: |
          mkdir -p zipped

          if [ "$(find encoded -type f | wc -l)" -eq 0 ]; then
            echo "No files found."
            exit 0
          fi

          TIMESTAMP=$(date +"%Y%m%d_%H%M%S")

          cd encoded
          zip -r -P "$ZIP_PASSWORD" "../zipped/${TIMESTAMP}.zip" .

      # 🚀 Release
      - name: Create Release
        if: hashFiles('zipped/*.zip') != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: yt-${{ github.run_number }}
          name: yt-dlp Release ${{ github.run_number }}
          files: zipped/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
