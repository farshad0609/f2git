name: yt-dlp Download and ZIP

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # 🐍 Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 📦 نصب yt-dlp
      - name: Install yt-dlp
        run: |
          python -m pip install --upgrade pip
          pip install -U yt-dlp

      # 🎬 دانلود فایل‌ها
      - name: Download videos
        run: |
          mkdir -p downloads

          yt-dlp \
            -a yt.txt \
            -o "downloads/%(title).100s.%(ext)s" \
            --no-playlist \
            --restrict-filenames \
            --merge-output-format mp4 \
            --retries 3 \
            --fragment-retries 3 \
            --concurrent-fragments 5

      # 🧹 حذف releaseهای قبلی
      - name: Delete old releases
        run: |
          gh release list --json tagName -q '.[].tagName' | while read tag; do
            if [ ! -z "$tag" ]; then
              echo "Deleting release: $tag"
              gh release delete "$tag" -y || true
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 📦 ساخت ZIP رمزدار
      - name: Create ZIP
        env:
          ZIP_PASSWORD: ${{ secrets.ZIP_PASSWORD }}
        run: |
          mkdir -p zipped

          if [ "$(find downloads -type f | wc -l)" -eq 0 ]; then
            echo "No files downloaded."
            exit 0
          fi

          TIMESTAMP=$(date +"%Y%m%d_%H%M%S")

          cd downloads
          zip -r -P "$ZIP_PASSWORD" "../zipped/${TIMESTAMP}.zip" .

      # 🚀 ساخت Release
      - name: Create Release
        if: hashFiles('zipped/*.zip') != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: yt-${{ github.run_number }}
          name: yt-dlp Release ${{ github.run_number }}
          files: zipped/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
