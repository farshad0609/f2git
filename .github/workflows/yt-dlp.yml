name: Smart Media Pipeline

on:
  workflow_dispatch:
    inputs:
      download_engine:
        description: "Download engine"
        required: true
        type: choice
        options:
          - yt-dlp
          - ytconvert
        default: yt-dlp

      quality:
        description: "Preferred quality"
        required: true
        type: choice
        options:
          - "480"
          - "720"
          - "1080"
          - best
        default: "480"

      encode_mode:
        description: "Encode mode"
        required: true
        type: choice
        options:
          - disabled
          - x265-veryfast
          - x264-lite
          - x264-540p
        default: x265-veryfast

      min_size_mb:
        description: "Minimum size for encoding (MB)"
        required: true
        default: "350"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Setup tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg zip jq
          pip install -U yt-dlp requests

      - name: Download files
        run: |
          mkdir -p downloads

          ENGINE="${{ github.event.inputs.download_engine }}"
          QUALITY="${{ github.event.inputs.quality }}"

          while read url; do
            [ -z "$url" ] && continue

            echo "Downloading: $url"

            if [[ "$ENGINE" == "ytconvert" && ( "$url" == *youtube.com* || "$url" == *youtu.be* ) ]]; then

              echo "Using ytconvert API..."

              URL="$url" QUALITY="$QUALITY" python3 - <<'EOF'
import os
import time
import re
import requests
import sys

url = os.environ.get("URL")
quality = os.environ.get("QUALITY")

payload = {
    "url": url,
    "os": "linux",
    "output": {
        "type": "video",
        "format": "mp4",
        "quality": quality if quality == "best" else quality + "p"
    }
}

s = requests.Session()
s.headers.update({
    "User-Agent": "Mozilla/5.0"
})

s.get("https://media.ytmp3.gg/")

r = s.post(
    "https://hub.ytconvert.org/api/download",
    json=payload,
    timeout=30
)

r.raise_for_status()

data = r.json()

status_url = data.get("statusUrl")

for _ in range(120):
    time.sleep(2)

    res = s.get(status_url).json()

    if res.get("status") == "completed":

        dl = res.get("downloadUrl")

        title = re.sub(
            r'[^a-zA-Z0-9_-]',
            '_',
            data.get("title", "video")
        )[:80]

        path = f"downloads/{title}.mp4"

        r2 = s.get(dl, stream=True)

        with open(path, "wb") as f:
            for c in r2.iter_content(1024 * 1024):
                if c:
                    f.write(c)

        print("DONE")
        sys.exit(0)

    if res.get("status") == "failed":
        print("FAILED")
        sys.exit(1)

EOF

            else

              if [[ "$QUALITY" == "best" ]]; then
                FORMAT="bestvideo+bestaudio/best"
              else
                FORMAT="bestvideo[height<=$QUALITY]+bestaudio/best[height<=$QUALITY]/best"
              fi

              yt-dlp \
                -f "$FORMAT" \
                --merge-output-format mp4 \
                --no-part \
                --restrict-filenames \
                -o "downloads/%(title).80s.%(ext)s" \
                "$url"

            fi

          done < yt.txt

      - name: Encode
        run: |
          mkdir -p encoded

          MODE="${{ github.event.inputs.encode_mode }}"
          MIN="${{ github.event.inputs.min_size_mb }}"

          for f in downloads/*; do

            [ -f "$f" ] || continue

            size=$(du -m "$f" | cut -f1)

            if [[ "$MODE" == "disabled" || "$size" -lt "$MIN" ]]; then
              cp "$f" encoded/
              continue
            fi

            base=$(basename "$f")
            out="encoded/${base%.*}.mp4"

            if [[ "$MODE" == "x265-veryfast" ]]; then

              ffmpeg -y \
                -i "$f" \
                -c:v libx265 \
                -preset veryfast \
                -crf 28 \
                -c:a aac \
                "$out"

            elif [[ "$MODE" == "x264-lite" ]]; then

              ffmpeg -y \
                -i "$f" \
                -c:v libx264 \
                -preset veryfast \
                -b:v 1000k \
                -c:a aac \
                "$out"

            else

              ffmpeg -y \
                -i "$f" \
                -vf scale=-2:540 \
                -c:v libx264 \
                -preset veryfast \
                -b:v 900k \
                -c:a aac \
                "$out"

            fi

          done

      - name: Zip
        run: |
          ts=$(date +"%Y%m%d_%H%M%S")

          zip -r \
            -P "${{ secrets.ZIP_PASSWORD }}" \
            "out_$ts.zip" \
            encoded/

      - name: Release
        uses: softprops/action-gh-release@v2

        with:
          tag_name: media-${{ github.run_number }}
          files: "*.zip"

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
