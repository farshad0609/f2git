name: Smart Media Pipeline

on:
  workflow_dispatch:
    inputs:

      download_engine:
        description: "Download engine"
        required: true
        type: choice
        options:
          - yt-dlp
          - ytconvert
        default: yt-dlp

      quality:
        description: "Preferred quality"
        required: true
        type: choice
        options:
          - "480"
          - "720"
          - "1080"
          - best
        default: "480"

      encode_mode:
        description: "Encode mode"
        required: true
        type: choice
        options:
          - disabled
          - x265-veryfast
          - x264-lite
          - x264-540p
        default: x265-veryfast

      min_size_mb:
        description: "Minimum size for encoding (MB)"
        required: true
        default: "350"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg zip jq
          pip install -U yt-dlp requests

      - name: Download files
        run: |
          mkdir -p downloads

          while read url; do
            [ -z "$url" ] && continue

            echo "Downloading: $url"

            ENGINE="${{ github.event.inputs.download_engine }}"
            QUALITY="${{ github.event.inputs.quality }}"

            ########################################
            # YTCONVERT (YouTube only)
            ########################################
            if [[ "$ENGINE" == "ytconvert" && ( "$url" == *"youtube.com"* || "$url" == *"youtu.be"* ) ]]; then

              echo "Using ytconvert API..."

              python3 << 'EOF'
import requests, time, re, os, sys

url = os.environ.get("URL")
quality = os.environ.get("QUALITY")

payload = {
    "url": url,
    "os": "linux",
    "output": {
        "type": "video",
        "format": "mp4",
        "quality": quality if quality == "best" else quality + "p"
    }
}

s = requests.Session()
s.headers.update({"User-Agent": "Mozilla/5.0"})

try:
    s.get("https://media.ytmp3.gg/")
    r = s.post("https://hub.ytconvert.org/api/download", json=payload, timeout=30)
    r.raise_for_status()
    data = r.json()

    status_url = data.get("statusUrl")

    for _ in range(120):
        time.sleep(2)
        res = s.get(status_url, timeout=20).json()
        if res.get("status") == "completed":
            dl = res.get("downloadUrl")
            title = re.sub(r'[^a-zA-Z0-9_-]', '_', data.get("title", "video"))[:80]
            path = f"downloads/{title}.mp4"

            r2 = s.get(dl, stream=True)
            with open(path, "wb") as f:
                for chunk in r2.iter_content(1024*1024):
                    if chunk:
                        f.write(chunk)

            print("DONE")
            sys.exit(0)

        if res.get("status") == "failed":
            print("FAILED")
            sys.exit(1)

except Exception as e:
    print("YTCONVERT ERROR:", e)
    sys.exit(1)

EOF

            else

              ########################################
              # YT-DLP (ALL SITES INCLUDING YOUTUBE)
              ########################################

              if [[ "$QUALITY" == "best" ]]; then
                FORMAT="bestvideo+bestaudio/best"
              else
                FORMAT="bestvideo[height<=${QUALITY}]+bestaudio/best[height<=${QUALITY}]/best"
              fi

              yt-dlp \
                -f "$FORMAT" \
                --merge-output-format mp4 \
                --no-part \
                --restrict-filenames \
                -o "downloads/%(title).80s.%(ext)s" \
                "$url"

            fi

          done < yt.txt

      - name: Encode videos
        run: |
          mkdir -p encoded

          MODE="${{ github.event.inputs.encode_mode }}"
          MIN_SIZE=${{ github.event.inputs.min_size_mb }}

          for file in downloads/*; do

            [ -f "$file" ] || continue

            size_mb=$(du -m "$file" | cut -f1)

            if [[ "$MODE" == "disabled" ]]; then
              cp "$file" encoded/
              continue
            fi

            if [[ "$size_mb" -lt "$MIN_SIZE" ]]; then
              cp "$file" encoded/
              continue
            fi

            bitrate=$(ffprobe -v error -select_streams v:0 \
              -show_entries stream=bit_rate -of default=nk=1:nw=1 "$file")

            bitrate_k=$((bitrate/1000))

            if [[ "$bitrate_k" -lt 900 ]]; then
              cp "$file" encoded/
              continue
            fi

            name=$(basename "$file")
            out="encoded/${name%.*}_enc.mp4"

            if [[ "$MODE" == "x265-veryfast" ]]; then
              ffmpeg -y -i "$file" -c:v libx265 -preset veryfast -crf 28 -c:a aac "$out"

            elif [[ "$MODE" == "x264-lite" ]]; then
              ffmpeg -y -i "$file" -c:v libx264 -preset veryfast -b:v 1000k -c:a aac "$out"

            elif [[ "$MODE" == "x264-540p" ]]; then
              ffmpeg -y -i "$file" -vf scale=-2:540 -c:v libx264 -preset veryfast -b:v 900k -c:a aac "$out"
            fi

          done

      - name: Create zip
        run: |
          mkdir -p out
          ts=$(date +"%Y%m%d_%H%M%S")

          zip -r -P "${{ secrets.ZIP_PASSWORD }}" "out/$ts.zip" encoded/

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: media-${{ github.run_number }}
          files: out/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
