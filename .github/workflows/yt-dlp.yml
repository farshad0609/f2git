name: yt-dlp Smart Download + Encode + ZIP

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # 🐍 Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 📦 Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -U yt-dlp
          sudo apt update
          sudo apt install -y ffmpeg zip jq

      # 🎬 Download videos
      - name: Download videos
        run: |
          mkdir -p downloads

          while read url; do

            [ -z "$url" ] && continue

            echo "Processing: $url"

            yt-dlp \
              -f "bestvideo[height<=480]+bestaudio/best[height<=480]/best" \
              --merge-output-format mp4 \
              --restrict-filenames \
              --write-info-json \
              -o "downloads/%(title).100s.%(ext)s" \
              "$url"

          done < yt.txt

      # 🎞️ Encode only videos higher than 480p
      - name: Encode videos
        run: |
          mkdir -p encoded

          find downloads -name "*.info.json" | while read jsonfile; do

            video=$(basename "$jsonfile" .info.json)

            resolution=$(jq '.height // 0' "$jsonfile")

            media=$(find downloads -type f | grep "$video" | grep -v ".info.json" | head -n 1)

            if [ -z "$media" ]; then
              continue
            fi

            filename=$(basename "$media")

            echo "Detected resolution: $resolution"

            if [ "$resolution" -le 480 ]; then

              echo "Skipping encode for 480p or lower: $filename"

              cp "$media" encoded/

            else

              echo "Encoding higher resolution video: $filename"

              output="encoded/${filename%.*}_x265.mp4"

              ffmpeg -y \
                -i "$media" \
                -c:v libx265 \
                -preset veryfast \
                -crf 28 \
                -c:a aac \
                -b:a 128k \
                "$output"

            fi

          done

      # 🧹 Delete old releases
      - name: Delete old releases
        run: |
          gh release list --json tagName -q '.[].tagName' | while read tag; do
            if [ ! -z "$tag" ]; then
              echo "Deleting release: $tag"
              gh release delete "$tag" -y || true
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 📦 Create password protected ZIP
      - name: Create ZIP
        env:
          ZIP_PASSWORD: ${{ secrets.ZIP_PASSWORD }}
        run: |
          mkdir -p zipped

          if [ "$(find encoded -type f | wc -l)" -eq 0 ]; then
            echo "No files found."
            exit 0
          fi

          TIMESTAMP=$(date +"%Y%m%d_%H%M%S")

          cd encoded
          zip -r -P "$ZIP_PASSWORD" "../zipped/${TIMESTAMP}.zip" .

      # 🚀 Upload Release
      - name: Create Release
        if: hashFiles('zipped/*.zip') != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: yt-${{ github.run_number }}
          name: yt-dlp Release ${{ github.run_number }}
          files: zipped/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
