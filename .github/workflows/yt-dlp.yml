name: 3 - Yt-dlp

on:
  workflow_dispatch:
    inputs:

      quality:
        description: "Preferred quality"
        required: true
        type: choice
        options:
          - "480"
          - "720"
          - "1080"
          - best
        default: "480"

      encode_mode:
        description: "Encode mode"
        required: true
        type: choice
        options:
          - disabled
          - x265-veryfast
          - x264-lite
          - x264-540p
        default: x265-veryfast

      min_size_mb:
        description: "Minimum size for encoding (MB)"
        required: true
        default: "350"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup tools
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            ffmpeg \
            zip \
            jq \
            python3 \
            python3-pip

          python3 -m pip install -U pip

          python3 -m pip install -U yt-dlp

          python3 -m pip install \
            git+https://github.com/mirkul-yeah/yt-dlp-uncensored-plugin.git

      - name: Check yt-dlp and plugins
        run: |
          echo "================ VERSION ================"
          yt-dlp --version

          echo "================ PATH ================"
          which yt-dlp || true

          echo "================ PLUGINS ================"
          yt-dlp --verbose --list-extractors | head -n 200 || true

      - name: Download videos
        run: |
          mkdir -p downloads

          QUALITY="${{ github.event.inputs.quality }}"

          while read -r url; do

            [ -z "$url" ] && continue

            echo "========================================"
            echo "Downloading: $url"
            echo "========================================"

            if [[ "$QUALITY" == "best" ]]; then
              FORMAT="bestvideo+bestaudio/best"
            else
              FORMAT="bestvideo[height<=$QUALITY]+bestaudio/best[height<=$QUALITY]/best"
            fi

            yt-dlp \
              -f "$FORMAT" \
              --merge-output-format mp4 \
              --no-part \
              --restrict-filenames \
              --newline \
              --embed-metadata \
              --embed-thumbnail \
              --no-playlist \
              --ignore-errors \
              --continue \
              --retries 10 \
              --fragment-retries 10 \
              --extractor-retries 10 \
              --file-access-retries 10 \
              --socket-timeout 30 \
              -o "downloads/%(title).80s.%(ext)s" \
              "$url"

          done < yt.txt

      - name: Encode videos
        run: |
          mkdir -p encoded

          MODE="${{ github.event.inputs.encode_mode }}"
          MIN_SIZE="${{ github.event.inputs.min_size_mb }}"

          for file in downloads/*; do

            [ -f "$file" ] || continue

            size_mb=$(du -m "$file" | cut -f1)

            echo "========================================"
            echo "Processing: $file"
            echo "Size: ${size_mb}MB"
            echo "========================================"

            if [[ "$MODE" == "disabled" ]]; then
              echo "Encoding disabled"
              cp "$file" encoded/
              continue
            fi

            if [[ "$size_mb" -lt "$MIN_SIZE" ]]; then
              echo "Skipping encode (small file)"
              cp "$file" encoded/
              continue
            fi

            bitrate=$(ffprobe \
              -v error \
              -select_streams v:0 \
              -show_entries stream=bit_rate \
              -of default=nk=1:nw=1 \
              "$file")

            bitrate=${bitrate:-0}

            bitrate_k=$((bitrate / 1000))

            echo "Bitrate: ${bitrate_k}k"

            if [[ "$bitrate_k" -lt 900 ]]; then
              echo "Skipping encode (bitrate too low)"
              cp "$file" encoded/
              continue
            fi

            name=$(basename "$file")
            output="encoded/${name%.*}_encoded.mp4"

            if [[ "$MODE" == "x265-veryfast" ]]; then

              ffmpeg -y \
                -i "$file" \
                -map 0:v \
                -map 0:a? \
                -map 0:s? \
                -c:v libx265 \
                -preset veryfast \
                -crf 28 \
                -tag:v hvc1 \
                -c:a aac \
                -b:a 128k \
                -c:s copy \
                -movflags +faststart \
                "$output"

            elif [[ "$MODE" == "x264-lite" ]]; then

              ffmpeg -y \
                -i "$file" \
                -map 0:v \
                -map 0:a? \
                -map 0:s? \
                -c:v libx264 \
                -preset veryfast \
                -b:v 1000k \
                -maxrate 1200k \
                -bufsize 2000k \
                -pix_fmt yuv420p \
                -c:a aac \
                -b:a 128k \
                -c:s copy \
                -movflags +faststart \
                "$output"

            elif [[ "$MODE" == "x264-540p" ]]; then

              ffmpeg -y \
                -i "$file" \
                -vf scale=-2:540 \
                -map 0:v \
                -map 0:a? \
                -map 0:s? \
                -c:v libx264 \
                -preset veryfast \
                -b:v 900k \
                -maxrate 1100k \
                -bufsize 1800k \
                -pix_fmt yuv420p \
                -c:a aac \
                -b:a 96k \
                -c:s copy \
                -movflags +faststart \
                "$output"

            fi

            if [[ ! -f "$output" ]]; then
              echo "Encode failed, copying original"
              cp "$file" encoded/
              continue
            fi

            original_size=$(du -m "$file" | cut -f1)
            encoded_size=$(du -m "$output" | cut -f1)

            echo "Original: ${original_size}MB"
            echo "Encoded : ${encoded_size}MB"

            if [[ "$encoded_size" -ge "$original_size" ]]; then
              echo "Encoded file larger than original, using original"
              rm -f "$output"
              cp "$file" encoded/
            fi

          done

      - name: Create zip
        run: |
          ts=$(date +"%Y%m%d_%H%M%S")

          zip -r \
            -P "${{ secrets.ZIP_PASSWORD }}" \
            "media_$ts.zip" \
            encoded/

      - name: Delete old releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          releases=$(gh release list --limit 100 | awk '{print $1}')

          for tag in $releases; do
            echo "Deleting release: $tag"
            gh release delete "$tag" -y || true
          done

      - name: Upload release
        uses: softprops/action-gh-release@v2

        with:
          tag_name: media-${{ github.run_number }}
          files: "*.zip"

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
