name: 3 - Yt-dlp

on:
  workflow_dispatch:
    inputs:

      quality:
        description: "Preferred quality"
        required: true
        type: choice
        options:
          - "480"
          - "720"
          - "1080"
          - best
        default: "720"

      encode_mode:
        description: "Encode mode"
        required: true
        type: choice
        options:
          - disabled
          - x265-veryfast
          - x265-540p
          - x264-lite
          - x264-540p
        default: x265-veryfast

      min_size_mb:
        description: "Minimum size for encoding (MB)"
        required: true
        default: "350"

      create_zip:
        description: "Create ZIP file?"
        required: true
        type: choice
        options:
          - "yes"
          - "no"
        default: "yes"

      delete_old_releases:
        description: "Delete old releases?"
        required: true
        type: choice
        options:
          - "yes"
          - "no"
        default: "yes"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg zip jq gh
          pip install -U yt-dlp

      - name: Download videos
        run: |
          mkdir -p downloads

          QUALITY="${{ github.event.inputs.quality }}"

          while read url; do

            [ -z "$url" ] && continue

            echo "Downloading: $url"

            if [[ "$QUALITY" == "best" ]]; then
              FORMAT="bestvideo+bestaudio/best"
            else
              FORMAT="bestvideo[height<=$QUALITY]+bestaudio/best[height<=$QUALITY]/best"
            fi

            yt-dlp \
              -f "$FORMAT" \
              --merge-output-format mp4 \
              --no-part \
              --restrict-filenames \
              -o "downloads/%(title).80s.%(ext)s" \
              "$url"

          done < yt.txt

      - name: Encode videos
        run: |
          mkdir -p encoded

          MODE="${{ github.event.inputs.encode_mode }}"
          MIN_SIZE="${{ github.event.inputs.min_size_mb }}"

          for file in downloads/*; do

            [ -f "$file" ] || continue

            size_mb=$(du -m "$file" | cut -f1)

            if [[ "$MODE" == "disabled" ]]; then
              cp "$file" encoded/
              continue
            fi

            if [[ "$size_mb" -lt "$MIN_SIZE" ]]; then
              cp "$file" encoded/
              continue
            fi

            bitrate=$(ffprobe \
              -v error \
              -select_streams v:0 \
              -show_entries stream=bit_rate \
              -of default=nk=1:nw=1 \
              "$file")

            bitrate=${bitrate:-0}
            bitrate_k=$((bitrate / 1000))

            if [[ "$bitrate_k" -lt 900 ]]; then
              echo "Skipping encode (bitrate too low): $file"
              cp "$file" encoded/
              continue
            fi

            name=$(basename "$file")
            output="encoded/${name%.*}_encoded.mp4"

            if [[ "$MODE" == "x265-veryfast" ]]; then

              ffmpeg -y \
                -i "$file" \
                -c:v libx265 \
                -preset veryfast \
                -crf 28 \
                -c:a aac \
                "$output"

            elif [[ "$MODE" == "x265-540p" ]]; then

              ffmpeg -y \
                -i "$file" \
                -vf "setpts=0.5*PTS,fps=30" \
                -af "atempo=2.0" \
                -c:v libx265 \
                -preset fast \
                -crf 27 \
                -x265-params no-sao=1:aq-mode=3:bframes=4:keyint=240 \
                -c:a aac -b:a 96k \
                "$output"

            elif [[ "$MODE" == "x264-lite" ]]; then

              ffmpeg -y \
                -i "$file" \
                -c:v libx264 \
                -preset veryfast \
                -b:v 1000k \
                -c:a aac \
                "$output"

            elif [[ "$MODE" == "x264-540p" ]]; then

              ffmpeg -y \
                -i "$file" \
                -c:v libsvtav1 \
                -preset 8 \
                -crf 32 \
                -svtav1-params tune=0 \
                -c:a aac -b:a 96k \
                "$output"

            fi

          done

      - name: Create ZIP
        if: github.event.inputs.create_zip == 'yes'
        run: |
          ts=$(date +"%Y%m%d_%H%M%S")

          zip -r \
            -P "${{ secrets.ZIP_PASSWORD }}" \
            "media_$ts.zip" \
            encoded/

      - name: Delete old releases
        if: github.event.inputs.delete_old_releases == 'yes'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          releases=$(gh release list --limit 100 | awk '{print $1}')

          for tag in $releases; do
            gh release delete "$tag" -y || true
          done

      - name: Upload ZIP Release
        if: github.event.inputs.create_zip == 'yes'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: media-${{ github.run_number }}
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        if: github.event.inputs.create_zip == 'no'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "media-${{ github.run_number }}" >/dev/null 2>&1 || \
          gh release create \
            "media-${{ github.run_number }}" \
            --title "media-${{ github.run_number }}" \
            --notes "Generated by workflow"

      - name: Upload Files
        if: github.event.inputs.create_zip == 'no'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload \
            "media-${{ github.run_number }}" \
            encoded/* \
            --clobber
