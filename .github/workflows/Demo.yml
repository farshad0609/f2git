name: 7. Build Demo Clips

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  demo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg zip curl

      - name: Create Demo Videos
        shell: bash
        run: |
          set +e

          mkdir -p demos
          mkdir -p work

          while IFS= read -r url || [ -n "$url" ]; do

            url="$(echo "$url" | xargs)"

            [[ -z "$url" ]] && continue

            echo "========================================"
            echo "Processing:"
            echo "$url"
            echo "========================================"

            filename=$(basename "${url%%\?*}")

            echo "Downloading..."

            curl -L --fail --retry 3 \
              -o "$filename" \
              "$url"

            if [[ $? -ne 0 ]]; then
              echo "Download failed, skipping..."
              continue
            fi

            if [[ ! -f "$filename" ]]; then
              echo "File not found after download, skipping..."
              continue
            fi

            duration=$(ffprobe \
              -v error \
              -show_entries format=duration \
              -of default=noprint_wrappers=1:nokey=1 \
              "$filename")

            echo "Duration: $duration seconds"

            base="${filename%.*}"
            ext="${filename##*.}"

            mkdir -p "work/$base"

            extract_segment() {
              local start="$1"
              local output="$2"

              local start_sec

              IFS=':' read -r hh mm ss <<< "$start"
              start_sec=$((10#$hh * 3600 + 10#$mm * 60 + 10#$ss))

              duration_int=${duration%.*}

              if (( start_sec >= duration_int )); then
                echo "Skipping $start (beyond video length)"
                return
              fi

              ffmpeg -y \
                -ss "$start" \
                -i "$filename" \
                -t 60 \
                -c copy \
                "$output"
            }

            extract_segment "00:05:00" "work/$base/part1.$ext"
            extract_segment "00:15:00" "work/$base/part2.$ext"
            extract_segment "00:20:00" "work/$base/part3.$ext"

            list_file="work/$base/list.txt"
            rm -f "$list_file"

            for part in \
              "part1.$ext" \
              "part2.$ext" \
              "part3.$ext"
            do
              if [[ -f "work/$base/$part" ]]; then
                echo "file '$part'" >> "$list_file"
              fi
            done

            if [[ ! -s "$list_file" ]]; then
              echo "No valid segments found."
              rm -f "$filename"
              continue
            fi

            echo "Creating demo..."

            (
              cd "work/$base"

              ffmpeg -y \
                -f concat \
                -safe 0 \
                -i list.txt \
                -c copy \
                "../../demos/${base}_demo.${ext}"
            )

            rm -f "$filename"

          done < link.txt

      - name: Check Demo Files
        run: |
          count=$(find demos -type f | wc -l)

          echo "Demo files: $count"

          if [ "$count" -eq 0 ]; then
            echo "No demo files created."
            exit 1
          fi

      - name: Create ZIP Archive
        run: |
          cd demos
          zip -r ../demo_videos.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: demo-${{ github.run_number }}
          name: Demo Videos ${{ github.run_number }}
          files: demo_videos.zip
          generate_release_notes: true
