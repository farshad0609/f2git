name: Browser Downloader + Telegram Upload

on:
  workflow_dispatch:
    inputs:

      aria2_mode:
        description: "Download mode"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - aria2_only
          - browser_only

      connections:
        description: "aria2 connections"
        required: true
        default: "4"
        type: choice
        options:
          - "1"
          - "2"
          - "4"
          - "8"
          - "16"

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            ffmpeg \
            aria2 \
            curl

          pip install \
            playwright \
            requests \
            pyrogram \
            tgcrypto

          playwright install chromium

      - name: Prepare folders
        run: |
          mkdir -p grabbed
          mkdir -p downloads

      - name: Copy links
        run: |
          cp browser.txt grabbed/links.txt

      - name: Extract video links
        run: |
          python << 'EOF'
          from playwright.sync_api import sync_playwright
          import re
          import time
          import os

          os.makedirs("grabbed", exist_ok=True)

          MIN_SIZE_MB = 20

          final_links = []

          with sync_playwright() as p:

              browser = p.chromium.launch(headless=True)

              page = browser.new_page()

              with open("grabbed/links.txt", "r", encoding="utf-8") as f:
                  urls = [x.strip() for x in f if x.strip()]

              for url in urls:

                  print(f"\nOPENING: {url}")

                  found = []

                  def handle_response(resp):

                      try:

                          u = resp.url.lower()

                          if any(x in u for x in [
                              ".mp4",
                              ".m3u8",
                              ".vid"
                          ]):

                              headers = resp.headers

                              size = int(headers.get("content-length", "0"))

                              found.append({
                                  "url": resp.url,
                                  "size": size
                              })

                      except:
                          pass

                  page.on("response", handle_response)

                  try:
                      page.goto(url, wait_until="networkidle", timeout=120000)
                      time.sleep(15)
                  except Exception as e:
                      print(e)

                  filtered = []

                  seen_sizes = set()

                  for item in found:

                      size_mb = item["size"] / 1024 / 1024

                      if size_mb < MIN_SIZE_MB:
                          continue

                      if item["size"] in seen_sizes:
                          continue

                      seen_sizes.add(item["size"])

                      filtered.append(item)

                  if not filtered:
                      print("NO VALID VIDEO FOUND")
                      continue

                  selected = None

                  for item in filtered:

                      size_mb = item["size"] / 1024 / 1024

                      if 150 <= size_mb <= 700:
                          selected = item
                          break

                  if not selected:
                      selected = max(filtered, key=lambda x: x["size"])

                  print(f"SELECTED: {selected['url']}")

                  final_links.append(selected["url"])

              browser.close()

          with open("grabbed/final_links.txt", "w", encoding="utf-8") as f:
              for x in final_links:
                  f.write(x + "\n")
          EOF

      - name: Download videos
        env:
          MODE: ${{ github.event.inputs.aria2_mode }}
          CONNECTIONS: ${{ github.event.inputs.connections }}
        run: |

          if [ ! -f grabbed/final_links.txt ]; then
            echo "No links found"
            exit 1
          fi

          COUNT=1

          while read URL; do

            echo "================================"
            echo "DOWNLOADING:"
            echo "$URL"
            echo "================================"

            OUT="downloads/video_${COUNT}.mp4"

            SUCCESS=0

            if [ "$MODE" != "browser_only" ]; then

              echo "[ARIA2] trying download..."

              aria2c \
                -x $CONNECTIONS \
                -s $CONNECTIONS \
                -k 1M \
                --file-allocation=none \
                --summary-interval=1 \
                --retry-wait=5 \
                --max-tries=3 \
                --timeout=30 \
                -o "$(basename "$OUT")" \
                -d downloads \
                "$URL"

              if [ -f "$OUT" ]; then

                SIZE=$(stat -c%s "$OUT")

                if [ "$SIZE" -gt 50000000 ]; then
                  echo "ARIA2 SUCCESS"
                  SUCCESS=1
                else
                  echo "ARIA2 downloaded invalid small file"
                  rm -f "$OUT"
                fi
              fi
            fi

            if [ "$SUCCESS" = "0" ]; then

              if [ "$MODE" != "aria2_only" ]; then

                echo "[BROWSER FALLBACK]"

                curl -L \
                  -A "Mozilla/5.0" \
                  -o "$OUT" \
                  "$URL"

                SIZE=$(stat -c%s "$OUT")

                if [ "$SIZE" -lt 50000000 ]; then
                  echo "Browser fallback failed"
                  rm -f "$OUT"
                fi

              fi
            fi

            COUNT=$((COUNT+1))

          done < grabbed/final_links.txt

      - name: Show downloaded files
        run: |
          echo "FILES:"
          ls -lh downloads || true

      - name: Upload to Telegram via Pyrogram
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          PYROGRAM_SESSION: ${{ secrets.PYROGRAM_SESSION }}
          TARGET_CHAT: ${{ secrets.TARGET_CHAT }}
        run: |
          python << 'EOF'
          import os
          import asyncio
          from pyrogram import Client

          API_ID = int(os.environ["API_ID"])
          API_HASH = os.environ["API_HASH"]
          SESSION = os.environ["PYROGRAM_SESSION"]
          TARGET = os.environ["TARGET_CHAT"]

          async def main():

              app = Client(
                  "uploader",
                  api_id=API_ID,
                  api_hash=API_HASH,
                  session_string=SESSION
              )

              await app.start()

              files = sorted(os.listdir("downloads"))

              for file in files:

                  path = os.path.join("downloads", file)

                  if not os.path.isfile(path):
                      continue

                  size_mb = os.path.getsize(path) / 1024 / 1024

                  print(f"Uploading: {file} ({size_mb:.1f} MB)")

                  try:

                      await app.send_video(
                          TARGET,
                          path,
                          caption=file,
                          supports_streaming=True
                      )

                      print("VIDEO SENT")

                  except Exception as e:

                      print(f"send_video failed: {e}")
                      print("Trying send_document...")

                      await app.send_document(
                          TARGET,
                          path,
                          caption=file
                      )

                      print("DOCUMENT SENT")

              await app.stop()

          asyncio.run(main())
          EOF
