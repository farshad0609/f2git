name: Browser Downloader To Telegram

on:
  workflow_dispatch:
    inputs:
      quality:
        description: "Preferred Quality"
        required: true
        default: "480"
        type: choice
        options:
          - "480"
          - "720"
          - "1080"

      download_mode:
        description: "Download Mode"
        required: true
        default: "auto"
        type: choice
        options:
          - "auto"
          - "aria2c"
          - "browser"

      aria2_connections:
        description: "Aria2 Connections"
        required: true
        default: "4"
        type: choice
        options:
          - "1"
          - "2"
          - "4"
          - "8"
          - "16"

jobs:
  browser-download:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Packages
        run: |
          sudo apt update

          sudo apt install -y \
            ffmpeg \
            curl \
            wget \
            aria2 \
            zip

          pip install playwright pyrogram tgcrypto requests

          playwright install chromium

      - name: Load Links
        run: |
          mkdir -p grabbed
          mkdir -p downloads

          cp browser.txt grabbed/links.txt

      - name: Extract Direct Video Links
        run: |
          python << 'EOF'
          import asyncio
          import re
          from playwright.async_api import async_playwright

          QUALITY = "${{ github.event.inputs.quality }}"

          async def main():
              with open("grabbed/links.txt", "r", encoding="utf-8") as f:
                  urls = [x.strip() for x in f if x.strip()]

              final_links = []

              async with async_playwright() as p:
                  browser = await p.chromium.launch(
                      headless=True
                  )

                  page = await browser.new_page()

                  for url in urls:
                      print(f"\nOPENING: {url}")

                      found = []

                      def handle_response(resp):
                          u = resp.url.lower()

                          if any(x in u for x in [
                              ".mp4",
                              ".m3u8",
                              ".vid"
                          ]):
                              found.append(resp.url)

                      page.on("response", handle_response)

                      try:
                          await page.goto(
                              url,
                              timeout=120000,
                              wait_until="networkidle"
                          )

                          await page.wait_for_timeout(12000)

                      except Exception as e:
                          print(e)

                      unique = list(dict.fromkeys(found))

                      best = None

                      for x in unique:
                          lx = x.lower()

                          if QUALITY == "480":
                              if "480" in lx:
                                  best = x
                                  break

                          if QUALITY == "720":
                              if "720" in lx:
                                  best = x
                                  break

                          if QUALITY == "1080":
                              if "1080" in lx:
                                  best = x
                                  break

                      if not best and unique:
                          best = max(unique, key=len)

                      if best:
                          print(f"SELECTED: {best}")
                          final_links.append(best)

                  await browser.close()

              with open("grabbed/final_links.txt", "w", encoding="utf-8") as f:
                  for x in final_links:
                      f.write(x + "\n")

          asyncio.run(main())
          EOF

      - name: Download Videos
        run: |
          if [ ! -f grabbed/final_links.txt ]; then
            echo "No links found"
            exit 1
          fi

          COUNT=1

          while IFS= read -r URL
          do
            echo "================================"
            echo "DOWNLOADING:"
            echo "$URL"
            echo "================================"

            FILE="downloads/video_${COUNT}.mp4"

            MODE="${{ github.event.inputs.download_mode }}"
            CONN="${{ github.event.inputs.aria2_connections }}"

            SUCCESS=0

            if [ "$MODE" = "auto" ] || [ "$MODE" = "aria2c" ]; then

              echo "[ARIA2] trying download..."

              aria2c \
                -x "$CONN" \
                -s "$CONN" \
                -k 1M \
                --max-tries=5 \
                --retry-wait=5 \
                --timeout=60 \
                --file-allocation=none \
                -o "$(basename "$FILE")" \
                -d downloads \
                "$URL"

              SIZE=$(stat -c%s "$FILE" 2>/dev/null || echo 0)

              if [ "$SIZE" -gt 20000000 ]; then
                echo "ARIA2 SUCCESS"
                SUCCESS=1
              else
                echo "ARIA2 FAILED OR TOO SMALL"
                rm -f "$FILE"
              fi
            fi

            if [ "$SUCCESS" = "0" ]; then

              echo "[BROWSER FALLBACK]"

              curl -L \
                -A "Mozilla/5.0" \
                --retry 5 \
                --connect-timeout 60 \
                -o "$FILE" \
                "$URL"

              SIZE=$(stat -c%s "$FILE" 2>/dev/null || echo 0)

              if [ "$SIZE" -lt 20000000 ]; then
                echo "Browser download failed"
                rm -f "$FILE"
              fi
            fi

            COUNT=$((COUNT+1))

          done < grabbed/final_links.txt

      - name: Show Downloaded Files
        run: |
          echo "FILES:"
          ls -lh downloads/

      - name: Upload To Telegram
        run: |
          python << 'EOF'
          import os
          import asyncio
          from pyrogram import Client

          API_ID = int(os.environ["API_ID"])
          API_HASH = os.environ["API_HASH"]
          SESSION = os.environ["PYROGRAM_SESSION"]

          CHAT_ID = int(os.environ["CHAT_ID"])

          app = Client(
              "uploader",
              api_id=API_ID,
              api_hash=API_HASH,
              session_string=SESSION
          )

          async def main():
              await app.start()

              files = sorted(os.listdir("downloads"))

              if not files:
                  print("No files found")
                  return

              for name in files:

                  path = os.path.join("downloads", name)

                  if not os.path.isfile(path):
                      continue

                  size_mb = os.path.getsize(path) / (1024 * 1024)

                  print(f"Uploading: {name} ({size_mb:.1f} MB)")

                  caption = f"{name}\n\nUploaded by GitHub Actions"

                  try:
                      await app.send_video(
                          chat_id=CHAT_ID,
                          video=path,
                          caption=caption,
                          supports_streaming=True
                      )

                      print("send_video success")

                  except Exception as e:

                      print(f"send_video failed: {e}")
                      print("Trying send_document...")

                      try:
                          await app.send_document(
                              chat_id=CHAT_ID,
                              document=path,
                              caption=caption
                          )

                          print("send_document success")

                      except Exception as e2:
                          print(f"send_document failed: {e2}")

              await app.stop()

          asyncio.run(main())
          EOF
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          PYROGRAM_SESSION: ${{ secrets.PYROGRAM_SESSION }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
