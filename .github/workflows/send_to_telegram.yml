name: Send To Telegram Pub Channel

on:
  workflow_dispatch:

jobs:
  telegram-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install pyrogram tgcrypto requests

      - name: Create uploader.py
        run: |
          cat > uploader.py << 'PYEOF'
          import os
          import glob
          import asyncio
          import requests

          from urllib.parse import urlparse, unquote
          from pyrogram import Client

          API_ID = int(os.environ["API_ID"])
          API_HASH = os.environ["API_HASH"]
          SESSION = os.environ["PYROGRAM_SESSION"]
          CHAT_ID = os.environ["CHAT_ID"]

          os.makedirs("downloads", exist_ok=True)

          # =========================================
          # DOWNLOAD FILES FROM link.txt
          # =========================================

          if not os.path.exists("link.txt"):
              raise Exception("link.txt not found")

          with open("link.txt", "r", encoding="utf-8") as f:
              links = [x.strip() for x in f if x.strip()]

          if not links:
              raise Exception("link.txt is empty")

          for i, url in enumerate(links, start=1):

              parsed = urlparse(url)

              real_name = os.path.basename(parsed.path)

              real_name = unquote(real_name)

              if not real_name or "." not in real_name:
                  real_name = f"file_{i}"

              filename = os.path.join("downloads", real_name)

              print("=" * 60)
              print("DOWNLOADING:")
              print(url)
              print("=" * 60)

              response = requests.get(url, stream=True)

              if response.status_code != 200:
                  print(f"FAILED: HTTP {response.status_code}")
                  continue

              total = int(response.headers.get("content-length", 0))
              downloaded = 0

              with open(filename, "wb") as f:

                  for chunk in response.iter_content(chunk_size=1024*1024):

                      if chunk:

                          f.write(chunk)

                          downloaded += len(chunk)

                          if total > 0:

                              percent = downloaded * 100 / total

                              print(
                                  f"\r{downloaded//1024//1024} MB / "
                                  f"{total//1024//1024} MB "
                                  f"({percent:.1f}%)",
                                  end=""
                              )

              print()
              print(f"DOWNLOADED: {filename}")

          # =========================================
          # TELEGRAM UPLOAD
          # =========================================

          async def main():

              print("STARTING PYROGRAM...")

              app = Client(
                  name="uploader",
                  api_id=API_ID,
                  api_hash=API_HASH,
                  session_string=str(SESSION).strip()
              )

              await app.start()

              me = await app.get_me()

              print(f"LOGGED IN AS: {me.first_name}")

              files = sorted(glob.glob("downloads/*"))

              if not files:
                  raise Exception("No files found")

              print(f"FOUND {len(files)} FILE(S)")

              for file in files:

                  size_mb = os.path.getsize(file) / 1024 / 1024

                  print("=" * 60)
                  print(
                      f"UPLOADING: "
                      f"{os.path.basename(file)} "
                      f"({size_mb:.1f} MB)"
                  )
                  print("=" * 60)

                  try:

                      video_ext = (
                          ".mp4",
                          ".mkv",
                          ".mov",
                          ".webm",
                          ".avi"
                      )

                      if file.lower().endswith(video_ext):

                          await app.send_video(
                              chat_id=CHAT_ID,
                              video=file,
                              caption=os.path.basename(file),
                              supports_streaming=True,
                              progress=lambda c, t:
                                  print(
                                      f"\rUPLOAD: {c*100/t:.1f}%",
                                      end=""
                                  )
                          )

                          print("\nVIDEO SENT")

                      else:

                          await app.send_document(
                              chat_id=CHAT_ID,
                              document=file,
                              caption=os.path.basename(file),
                              progress=lambda c, t:
                                  print(
                                      f"\rUPLOAD: {c*100/t:.1f}%",
                                      end=""
                                  )
                          )

                          print("\nDOCUMENT SENT")

                  except Exception as e:

                      print()
                      print(f"UPLOAD FAILED: {e}")

              await app.stop()

              print("DONE")

          asyncio.run(main())
          PYEOF

      - name: Run uploader
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          PYROGRAM_SESSION: ${{ secrets.PYROGRAM_SESSION }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          python uploader.py
