name: Upload Release Files To Telegram

on:
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install requirements
        run: |
          pip install -U pyrogram tgcrypto requests

      - name: Create uploader.py
        run: |
          cat > uploader.py << 'PYEOF'
          import os
          import glob
          import asyncio
          import requests
          from pyrogram import Client

          API_ID = int(os.environ["API_ID"])
          API_HASH = os.environ["API_HASH"]
          SESSION = os.environ["SESSION_STRING"]
          CHAT_ID = int(os.environ["CHAT_ID"])

          LINK_FILE = "link.txt"

          os.makedirs("downloads", exist_ok=True)

          def download_files():
              if not os.path.exists(LINK_FILE):
                  raise Exception("link.txt not found")

              with open(LINK_FILE, "r", encoding="utf-8") as f:
                  links = [x.strip() for x in f if x.strip()]

              if not links:
                  raise Exception("link.txt is empty")

              for i, url in enumerate(links, start=1):
                  filename = f"downloads/file_{i}.zip"

                  print("=" * 60)
                  print(f"DOWNLOADING: {url}")
                  print("=" * 60)

                  r = requests.get(url, stream=True, timeout=60)

                  if r.status_code != 200:
                      print(f"FAILED: HTTP {r.status_code}")
                      continue

                  total = int(r.headers.get("content-length", 0))
                  downloaded = 0

                  with open(filename, "wb") as f:
                      for chunk in r.iter_content(chunk_size=1024 * 1024):
                          if chunk:
                              f.write(chunk)
                              downloaded += len(chunk)

                              if total > 0:
                                  percent = downloaded * 100 / total
                                  print(
                                      f"\r{downloaded // (1024*1024)} MB / "
                                      f"{total // (1024*1024)} MB "
                                      f"({percent:.1f}%)",
                                      end=""
                                  )

                  print()
                  print(f"DOWNLOADED: {filename}")

          async def upload_files():
              print("STARTING PYROGRAM CLIENT...")

              app = Client(
                  "uploader",
                  api_id=API_ID,
                  api_hash=API_HASH,
                  session_string=SESSION
              )

              await app.start()

              me = await app.get_me()
              print(f"LOGGED IN AS: {me.first_name}")

              files = sorted(glob.glob("downloads/*"))

              if not files:
                  raise Exception("No files found in downloads folder")

              print(f"FOUND {len(files)} FILE(S)")

              for file in files:
                  size_mb = os.path.getsize(file) / 1024 / 1024

                  print("=" * 60)
                  print(f"UPLOADING: {file}")
                  print(f"SIZE: {size_mb:.1f} MB")
                  print("=" * 60)

                  try:
                      await app.send_document(
                          chat_id=CHAT_ID,
                          document=file,
                          caption=os.path.basename(file),
                          progress=lambda c, t: print(
                              f"\rUPLOAD: {c*100/t:.1f}%",
                              end=""
                          )
                      )

                      print()
                      print("UPLOAD SUCCESS")

                  except Exception as e:
                      print()
                      print(f"UPLOAD FAILED: {e}")

              await app.stop()
              print("CLIENT STOPPED")

          async def main():
              download_files()
              await upload_files()

          asyncio.run(main())
          PYEOF

      - name: Run uploader
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          SESSION_STRING: ${{ secrets.SESSION_STRING }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          python uploader.py
