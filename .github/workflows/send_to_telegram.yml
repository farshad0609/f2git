name: Upload To Telegram Public Channel

on:
  workflow_dispatch:

jobs:
  telegram-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install pyrogram tgcrypto requests

      - name: Create uploader.py
        run: |
          cat > uploader.py << 'PYEOF'
          import os
          import glob
          import asyncio
          import requests
          from pyrogram import Client

          API_ID = int(os.environ["API_ID"])
          API_HASH = os.environ["API_HASH"]
          SESSION = os.environ["PYROGRAM_SESSION"]
          CHAT_ID = os.environ["CHAT_ID"]

          os.makedirs("downloads", exist_ok=True)

          # =========================
          # DOWNLOAD FILES
          # =========================

          if not os.path.exists("link.txt"):
              raise Exception("link.txt not found")

          with open("link.txt", "r", encoding="utf-8") as f:
              links = [x.strip() for x in f if x.strip()]

          if not links:
              raise Exception("link.txt is empty")

          for i, url in enumerate(links, start=1):

              filename = f"downloads/file_{i}.zip"

              print("=" * 60)
              print("DOWNLOADING:")
              print(url)
              print("=" * 60)

              r = requests.get(url, stream=True)

              total = int(r.headers.get("content-length", 0))
              downloaded = 0

              with open(filename, "wb") as f:
                  for chunk in r.iter_content(chunk_size=1024*1024):
                      if chunk:
                          f.write(chunk)
                          downloaded += len(chunk)

                          if total > 0:
                              percent = downloaded * 100 / total
                              print(
                                  f"\r{downloaded//1024//1024} MB / "
                                  f"{total//1024//1024} MB "
                                  f"({percent:.1f}%)",
                                  end=""
                              )

              print()
              print(f"DOWNLOADED: {filename}")

          # =========================
          # TELEGRAM UPLOAD
          # =========================

          async def main():

              app = Client(
                  "uploader",
                  api_id=API_ID,
                  api_hash=API_HASH,
                  session_string=SESSION
              )

              await app.start()

              me = await app.get_me()
              print(f"LOGGED IN AS: {me.first_name}")

              files = sorted(glob.glob("downloads/*"))

              for file in files:

                  size_mb = os.path.getsize(file) / 1024 / 1024

                  print("=" * 60)
                  print(f"Uploading: {os.path.basename(file)} ({size_mb:.1f} MB)")
                  print("=" * 60)

                  try:
                      await app.send_video(
                          chat_id=CHAT_ID,
                          video=file,
                          caption=os.path.basename(file),
                          supports_streaming=True,
                          progress=lambda c, t:
                              print(f"\rUPLOAD: {c*100/t:.1f}%", end="")
                      )

                      print("\nVIDEO SENT")

                  except Exception as e:

                      print(f"\nsend_video failed: {e}")
                      print("Trying send_document...")

                      await app.send_document(
                          chat_id=CHAT_ID,
                          document=file,
                          caption=os.path.basename(file),
                          progress=lambda c, t:
                              print(f"\rUPLOAD: {c*100/t:.1f}%", end="")
                      )

                      print("\nDOCUMENT SENT")

              await app.stop()

          asyncio.run(main())
          PYEOF

      - name: Run uploader
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          PYROGRAM_SESSION: ${{ secrets.PYROGRAM_SESSION }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          python uploader.py
