name: Download And Upload To Telegram

on:
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |

          sudo apt update

          sudo apt install -y aria2

          pip install -U pyrogram tgcrypto

      - name: Download Files
        run: |

          mkdir -p downloads

          echo "READING link.txt"

          if [ ! -f link.txt ]; then
            echo "link.txt NOT FOUND!"
            exit 1
          fi

          COUNT=1

          while IFS= read -r URL
          do

            [ -z "$URL" ] && continue

            echo ""
            echo "================================"
            echo "DOWNLOADING:"
            echo "$URL"
            echo "================================"

            aria2c \
              -x 8 \
              -s 8 \
              -k 1M \
              --file-allocation=none \
              -d downloads \
              -o "file_${COUNT}.zip" \
              "$URL"

            COUNT=$((COUNT+1))

          done < link.txt

      - name: Show Files
        run: |
          ls -lh downloads

      - name: Create uploader.py
        run: |

          cat > uploader.py << 'PYEOF'

          import os
          import asyncio
          from pyrogram import Client

          API_ID = int(os.getenv("API_ID"))
          API_HASH = os.getenv("API_HASH")
          SESSION = os.getenv("PYROGRAM_SESSION")
          CHAT_ID = int(os.getenv("TG_CHAT_ID"))

          print("STARTING CLIENT...")

          app = Client(
              "uploader",
              api_id=API_ID,
              api_hash=API_HASH,
              session_string=SESSION
          )

          async def main():

              print("CONNECTING...")

              await app.start()

              print("CONNECTED!")

              me = await app.get_me()

              print("LOGGED IN AS:", me.first_name)
              print("CHAT_ID:", CHAT_ID)

              files = sorted(os.listdir("downloads"))

              print("FILES:", files)

              for file in files:

                  path = f"downloads/{file}"

                  if not os.path.isfile(path):
                      continue

                  size_mb = round(
                      os.path.getsize(path) / 1024 / 1024,
                      1
                  )

                  print("")
                  print(f"UPLOADING: {file}")
                  print(f"SIZE: {size_mb} MB")

                  try:

                      await app.send_document(
                          chat_id=CHAT_ID,
                          document=path,
                          caption=file
                      )

                      print("UPLOAD SUCCESS")

                  except Exception as e:

                      print("UPLOAD FAILED")
                      print(repr(e))

                      raise e

              await app.stop()

              print("DONE")

          asyncio.run(main())

          PYEOF

      - name: Upload To Telegram
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          PYROGRAM_SESSION: ${{ secrets.PYROGRAM_SESSION }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}

        run: |

          python uploader.py
