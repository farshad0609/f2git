name: Download And Upload To Telegram

on:
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |

          sudo apt update

          sudo apt install -y aria2

          pip install -U pyrogram tgcrypto

      - name: Download Files
        run: |

          mkdir -p downloads

          echo "================================"
          echo "READING link.txt"
          echo "================================"

          if [ ! -f link.txt ]; then
            echo "link.txt NOT FOUND!"
            exit 1
          fi

          COUNT=1

          while IFS= read -r URL
          do

            # skip empty lines
            [ -z "$URL" ] && continue

            echo ""
            echo "================================"
            echo "DOWNLOADING FILE $COUNT"
            echo "$URL"
            echo "================================"

            aria2c \
              -x 8 \
              -s 8 \
              -k 1M \
              --file-allocation=none \
              --summary-interval=1 \
              --console-log-level=notice \
              -d downloads \
              -o "file_${COUNT}.zip" \
              "$URL"

            echo ""
            echo "DOWNLOAD FINISHED: file_${COUNT}.zip"

            COUNT=$((COUNT+1))

          done < link.txt

      - name: Show Downloaded Files
        run: |

          echo ""
          echo "================================"
          echo "DOWNLOADED FILES"
          echo "================================"

          ls -lh downloads

      - name: Upload To Telegram
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          PYROGRAM_SESSION: ${{ secrets.PYROGRAM_SESSION }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}

        run: |

          python << 'EOF'

          import os
          import asyncio

          from pyrogram import Client

          API_ID = int(os.getenv("API_ID"))
          API_HASH = os.getenv("API_HASH")
          SESSION = os.getenv("PYROGRAM_SESSION")

          # IMPORTANT
          CHAT_ID = int(os.getenv("TG_CHAT_ID"))

          print("================================")
          print("STARTING TELEGRAM CLIENT")
          print("================================")

          app = Client(
              "uploader",
              api_id=API_ID,
              api_hash=API_HASH,
              session_string=SESSION
          )

          async def main():

              print("CONNECTING TO TELEGRAM...")

              await asyncio.wait_for(
                  app.start(),
                  timeout=60
              )

              print("CONNECTED!")

              me = await app.get_me()

              print("")
              print("================================")
              print("ACCOUNT INFO")
              print("================================")
              print("NAME:", me.first_name)
              print("ID:", me.id)
              print("CHAT_ID:", CHAT_ID)

              print("")
              print("================================")
              print("CHECKING DOWNLOADS")
              print("================================")

              files = sorted(os.listdir("downloads"))

              print("FILES FOUND:", len(files))

              if not files:
                  print("NO FILES FOUND!")
                  return

              for file in files:

                  path = f"downloads/{file}"

                  if not os.path.isfile(path):
                      continue

                  size_mb = round(
                      os.path.getsize(path) / 1024 / 1024,
                      1
                  )

                  print("")
                  print("================================")
                  print(f"UPLOADING: {file}")
                  print(f"SIZE: {size_mb} MB")
                  print("================================")

                  try:

                      await asyncio.wait_for(

                          app.send_document(
                              chat_id=CHAT_ID,
                              document=path,
                              caption=file

                          ),

                          timeout=3600

                      )

                      print("UPLOAD SUCCESS!")

                  except Exception as e:

                      print("")
                      print("================================")
                      print("UPLOAD FAILED!")
                      print("================================")

                      print(repr(e))

                      raise e

              print("")
              print("================================")
              print("ALL FILES UPLOADED")
              print("================================")

              await app.stop()

              print("CLIENT CLOSED")

          asyncio.run(main())

          EOF
