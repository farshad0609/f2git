name: Single ZIP

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run downloader
        run: python download_all.py

      # 🧹 حذف releaseهای قبلی
      - name: Delete old releases
        run: |
          gh release list --json tagName -q '.[].tagName' | while read tag; do
            if [ ! -z "$tag" ]; then
              echo "Deleting release: $tag"
              gh release delete "$tag" -y || true
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 📦 ساخت ZIP فقط اگر فایل وجود داشت
      - name: Create single ZIP
        run: |
          mkdir -p zipped

          if [ "$(find downloads -type f | wc -l)" -eq 0 ]; then
            echo "No files downloaded."
            exit 0
          fi

          cd downloads
          zip -r -P github ../zipped/all.zip .

      # 🚀 ساخت Release فقط اگر ZIP وجود داشت
      - name: Create Release
        if: hashFiles('zipped/all.zip') != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-${{ github.run_number }}
          name: Single ZIP Release ${{ github.run_number }}
          files: zipped/all.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
