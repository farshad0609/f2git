name: 2 - Single ZIP

on:
  workflow_dispatch:
    inputs:
      max_size_mb:
        description: "Max archive size per part in MB (e.g. 950)"
        required: false
        default: "950"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Install 7zip
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full

      - name: Run downloader
        run: python download_all.py

      # 🧹 حذف releaseهای قبلی
      - name: Delete old releases
        run: |
          gh release list --json tagName -q '.[].tagName' | while read tag; do
            if [ ! -z "$tag" ]; then
              echo "Deleting release: $tag"
              gh release delete "$tag" -y || true
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 📦 ساخت آرشیو 7z (multi-part واقعی)
      - name: Create 7z archive (multi-part safe)
        env:
          ZIP_PASSWORD: ${{ secrets.ZIP_PASSWORD }}
        run: |
          if [ "$(find downloads -type f | wc -l)" -eq 0 ]; then
            echo "No files downloaded."
            exit 0
          fi

          TIMESTAMP=$(date +"%Y%m%d_%H%M%S")
          ARCHIVE_NAME="zipped/${TIMESTAMP}.7z"

          mkdir -p zipped

          MAX_MB=${{ github.event.inputs.max_size_mb }}

          cd downloads

          # ساخت آرشیو multi-part واقعی
          7z a -t7z -m0=lzma2 -mx=9 \
            -v${MAX_MB}m \
            -p"$ZIP_PASSWORD" \
            "../$ARCHIVE_NAME" \
            .

          echo "ARCHIVE_BASENAME=$ARCHIVE_NAME" >> $GITHUB_ENV
          echo "TIMESTAMP=$TIMESTAMP" >> $GITHUB_ENV

      # 🚀 ساخت Release
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-${{ github.run_number }}
          name: Single Archive Release ${{ github.run_number }}
          files: zipped/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
